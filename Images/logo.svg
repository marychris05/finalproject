<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" width="320" height="280">
  <defs>
    <!-- Main circle gradient -->
    <radialGradient id="circleGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#4a9fd4"/>
      <stop offset="50%" stop-color="#1a5fa8"/>
      <stop offset="100%" stop-color="#0a2d6e"/>
    </radialGradient>

    <!-- RJ45 port gradient -->
    <linearGradient id="portGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8d8e8"/>
      <stop offset="100%" stop-color="#7a9ab8"/>
    </linearGradient>

    <!-- Cable gradient -->
    <linearGradient id="cableGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0dce8"/>
      <stop offset="50%" stop-color="#8aaac8"/>
      <stop offset="100%" stop-color="#5a7a98"/>
    </linearGradient>

    <!-- Server rack gradient -->
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>

    <!-- M letter gradient -->
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5bc8f5"/>
      <stop offset="100%" stop-color="#1a6abf"/>
    </linearGradient>

    <!-- S letter gradient -->
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5bc8f5"/>
      <stop offset="100%" stop-color="#1a6abf"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.4)"/>
    </filter>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Text path for binary ring -->
    <path id="topArc"    d="M 160,160 m -115,0 a 115,115 0 1,1 230,0" />
    <path id="bottomArc" d="M 160,160 m -115,0 a 115,115 0 0,0 230,0" />
  </defs>

  <!-- ── BINARY RING (outer text) ── -->
  <text font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#111" letter-spacing="2">
    <textPath href="#topArc" startOffset="2%">01001001  01010011  01001001</textPath>
  </text>
  <text font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#111" letter-spacing="2">
    <textPath href="#bottomArc" startOffset="5%">01001010  10010101  01001010</textPath>
  </text>

  <!-- ── MAIN CIRCLE ── -->
  <circle cx="148" cy="148" r="108" fill="url(#circleGrad)" filter="url(#shadow)"/>

  <!-- Circle inner highlight ring -->
  <circle cx="148" cy="148" r="108" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>
  <circle cx="148" cy="148" r="100" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- ── RJ45 ETHERNET PORT ── -->
  <g transform="translate(72, 68)" filter="url(#shadow)">
    <!-- Port body -->
    <rect x="0" y="0" width="68" height="54" rx="6" ry="6" fill="url(#portGrad)" opacity="0.88"/>
    <!-- Port opening (dark slot) -->
    <rect x="8" y="10" width="52" height="32" rx="3" ry="3" fill="#1a2a3a"/>
    <!-- Pin contacts inside port -->
    <rect x="12" y="14" width="5" height="22" rx="1" fill="#8ab0cc"/>
    <rect x="19" y="14" width="5" height="22" rx="1" fill="#8ab0cc"/>
    <rect x="26" y="14" width="5" height="22" rx="1" fill="#8ab0cc"/>
    <rect x="33" y="14" width="5" height="22" rx="1" fill="#8ab0cc"/>
    <rect x="40" y="14" width="5" height="22" rx="1" fill="#8ab0cc"/>
    <rect x="47" y="14" width="5" height="22" rx="1" fill="#8ab0cc"/>
    <rect x="54" y="14" width="5" height="22" rx="1" fill="#8ab0cc"/>
    <!-- Latch tab -->
    <rect x="24" y="44" width="20" height="8" rx="2" fill="#7a9ab8"/>
    <!-- Port top highlight -->
    <rect x="0" y="0" width="68" height="12" rx="6" ry="0" fill="rgba(255,255,255,0.2)"/>
  </g>

  <!-- ── ETHERNET CABLE (diagonal, bottom-left curve) ── -->
  <g filter="url(#shadow)">
    <!-- Cable body — thick diagonal -->
    <path d="M 108 200 Q 130 175 155 155 Q 175 138 195 118"
          fill="none" stroke="url(#cableGrad)" stroke-width="14" stroke-linecap="round"/>
    <!-- Cable shine -->
    <path d="M 110 197 Q 132 172 157 152 Q 177 135 197 115"
          fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="4" stroke-linecap="round"/>
    <!-- Cable stripes (ridges) -->
    <path d="M 118 192 Q 140 167 165 147" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="4,5"/>
    <path d="M 125 186 Q 147 161 172 141" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="4,5"/>
    <path d="M 132 180 Q 154 155 179 135" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="4,5"/>
    <!-- RJ45 plug head at top -->
    <rect x="188" y="108" width="22" height="16" rx="3" fill="#b0c8dc" transform="rotate(-42 199 116)"/>
    <rect x="191" y="111" width="16" height="10" rx="1" fill="#1a2a3a" transform="rotate(-42 199 116)"/>
    <!-- Plug latch -->
    <rect x="193" y="119" width="10" height="4" rx="1" fill="#8ab0cc" transform="rotate(-42 199 116)"/>
  </g>

  <!-- ── WIFI / SIGNAL WAVES (top right of circle) ── -->
  <g transform="translate(218, 108)" fill="none" stroke="#222" stroke-linecap="round">
    <path d="M 0,18 Q 8,8 18,18"  stroke-width="3.5"/>
    <path d="M -6,24 Q 12,4 30,24" stroke-width="3.5"/>
    <path d="M -12,30 Q 16,0 42,30" stroke-width="3.5"/>
    <!-- Center dot -->
    <circle cx="18" cy="18" r="4" fill="#222" stroke="none"/>
  </g>

  <!-- ── SMALL SEAL / BADGE (on cable, top right area) ── -->
  <g transform="translate(208, 100)">
    <circle cx="16" cy="16" r="16" fill="#c8860a" stroke="#f0a020" stroke-width="2"/>
    <circle cx="16" cy="16" r="12" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <!-- Simple gear/star inside badge -->
    <circle cx="16" cy="16" r="6" fill="rgba(255,255,255,0.25)"/>
    <circle cx="16" cy="16" r="3" fill="rgba(255,255,255,0.5)"/>
    <!-- Rays -->
    <line x1="16" y1="5"  x2="16" y2="8"  stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <line x1="16" y1="24" x2="16" y2="27" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <line x1="5"  y1="16" x2="8"  y2="16" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <line x1="24" y1="16" x2="27" y2="16" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <line x1="8"  y1="8"  x2="10" y2="10" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <line x1="22" y1="22" x2="24" y2="24" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <line x1="22" y1="8"  x2="24" y2="10" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" transform="scale(-1,1) translate(-32,0)"/>
    <line x1="8"  y1="22" x2="10" y2="24" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" transform="scale(-1,1) translate(-32,0)"/>
  </g>

  <!-- ── M LETTER ── -->
  <text x="118" y="248"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-size="72" font-weight="900"
        fill="url(#mGrad)"
        filter="url(#shadow)"
        letter-spacing="-2">M</text>

  <!-- ── SERVER RACK (replaces the "I" in MIS) ── -->
  <g transform="translate(192, 185)" filter="url(#shadow)">
    <!-- Rack chassis -->
    <rect x="0" y="0" width="28" height="62" rx="3" fill="url(#serverGrad)"/>
    <!-- Rack units (horizontal slats) -->
    <rect x="2" y="4"  width="24" height="7" rx="1" fill="#444"/>
    <rect x="2" y="13" width="24" height="7" rx="1" fill="#3a3a3a"/>
    <rect x="2" y="22" width="24" height="7" rx="1" fill="#444"/>
    <rect x="2" y="31" width="24" height="7" rx="1" fill="#3a3a3a"/>
    <rect x="2" y="40" width="24" height="7" rx="1" fill="#444"/>
    <rect x="2" y="49" width="24" height="7" rx="1" fill="#3a3a3a"/>
    <!-- LED dots -->
    <circle cx="22" cy="7.5"  r="2" fill="#00ff88" opacity="0.9"/>
    <circle cx="22" cy="16.5" r="2" fill="#00aaff" opacity="0.9"/>
    <circle cx="22" cy="25.5" r="2" fill="#00ff88" opacity="0.9"/>
    <circle cx="22" cy="34.5" r="2" fill="#ffaa00" opacity="0.9"/>
    <circle cx="22" cy="43.5" r="2" fill="#00ff88" opacity="0.9"/>
    <circle cx="22" cy="52.5" r="2" fill="#00aaff" opacity="0.9"/>
    <!-- Rack highlight -->
    <rect x="0" y="0" width="28" height="8" rx="3" fill="rgba(255,255,255,0.12)"/>
  </g>

  <!-- ── S LETTER ── -->
  <text x="222" y="248"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-size="72" font-weight="900"
        fill="url(#sGrad)"
        filter="url(#shadow)"
        letter-spacing="-2">S</text>

  <!-- ── ARGAO TEXT ── -->
  <text x="192" y="268"
        font-family="'Arial', sans-serif"
        font-size="13" font-weight="700"
        fill="#333"
        text-anchor="middle"
        letter-spacing="3">ARGAO</text>

</svg>
